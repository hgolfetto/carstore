<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
</head>
<body>

<h1>Dashboard de Carros</h1>

<a href="/">Voltar para cadastro</a>

<h2>Lista de Carros</h2>

<ul>
    <li th:each="car : ${cars}">
        <span th:text="${car.name}"></span> -
        <span th:text="${car.brand}"></span> -
        <span th:text="${car.year}"></span>
    </li>
</ul>
</body>
</html>
